<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>.t{font-family:Arial,Helvetica,sans-serif}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1400" height="720" rx="24" fill="#0F172A"/>
  <text x="54" y="74" class="t" fill="#F8FAFC" font-size="34" font-weight="800">Realtime Data Flow</text>
  <text x="54" y="110" class="t" fill="#94A3B8" font-size="20">From raw sensor measurements to browser-side telemetry and alert decisions.</text>

  <rect x="60" y="210" width="230" height="120" rx="22" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="110" y="262" class="t" fill="#E0F2FE" font-size="28" font-weight="800">Raw Sensors</text>
  <text x="92" y="296" class="t" fill="#CBD5E1" font-size="18">Flame / smoke / temp / distance</text>

  <rect x="365" y="210" width="250" height="120" rx="22" fill="#111827" stroke="#22C55E" stroke-width="2"/>
  <text x="394" y="262" class="t" fill="#DCFCE7" font-size="28" font-weight="800">Sampling Layer</text>
  <text x="396" y="296" class="t" fill="#CBD5E1" font-size="18">ADC / GPIO / timing / filtering</text>

  <rect x="690" y="210" width="260" height="120" rx="22" fill="#111827" stroke="#F59E0B" stroke-width="2"/>
  <text x="718" y="262" class="t" fill="#FEF3C7" font-size="28" font-weight="800">Decision Engine</text>
  <text x="727" y="296" class="t" fill="#CBD5E1" font-size="18">State + thresholds + fusion</text>

  <rect x="1025" y="210" width="290" height="120" rx="22" fill="#111827" stroke="#F97316" stroke-width="2"/>
  <text x="1063" y="262" class="t" fill="#FFEDD5" font-size="28" font-weight="800">Telemetry Packaging</text>
  <text x="1083" y="296" class="t" fill="#CBD5E1" font-size="18">Frame formatting / UART buffer</text>

  <line x1="290" y1="270" x2="365" y2="270" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="615" y1="270" x2="690" y2="270" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="950" y1="270" x2="1025" y2="270" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="190" y="470" width="240" height="120" rx="22" fill="#111827" stroke="#A855F7" stroke-width="2"/>
  <text x="248" y="522" class="t" fill="#F3E8FF" font-size="28" font-weight="800">Actuation</text>
  <text x="233" y="556" class="t" fill="#CBD5E1" font-size="18">Motor / servo / extinguisher</text>

  <rect x="580" y="470" width="240" height="120" rx="22" fill="#111827" stroke="#06B6D4" stroke-width="2"/>
  <text x="639" y="522" class="t" fill="#CFFAFE" font-size="28" font-weight="800">ESP32</text>
  <text x="627" y="556" class="t" fill="#CBD5E1" font-size="18">WiFi relay / WebSocket</text>

  <rect x="970" y="470" width="240" height="120" rx="22" fill="#111827" stroke="#84CC16" stroke-width="2"/>
  <text x="1034" y="522" class="t" fill="#ECFCCB" font-size="28" font-weight="800">Dashboard</text>
  <text x="1023" y="556" class="t" fill="#CBD5E1" font-size="18">Charts / status / alerts</text>

  <line x1="820" y1="330" x2="310" y2="470" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1170" y1="330" x2="700" y2="470" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="820" y1="530" x2="970" y2="530" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
