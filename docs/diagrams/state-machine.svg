<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>.t{font-family:Arial,Helvetica,sans-serif}</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1200" height="760" rx="24" fill="#0F172A"/>
  <text x="60" y="78" class="t" fill="#F8FAFC" font-size="34" font-weight="800">Robot State Machine</text>
  <text x="60" y="114" class="t" fill="#94A3B8" font-size="20">A clean finite-state workflow for patrol, detection, approach, extinguishing, and recovery.</text>

  <g>
    <rect x="80" y="210" width="190" height="90" rx="22" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
    <text x="147" y="262" class="t" fill="#E0F2FE" font-size="30" font-weight="800">IDLE</text>
    <text x="115" y="286" class="t" fill="#CBD5E1" font-size="18">Boot / self-check</text>

    <rect x="350" y="210" width="220" height="90" rx="22" fill="#111827" stroke="#22C55E" stroke-width="2"/>
    <text x="414" y="262" class="t" fill="#DCFCE7" font-size="30" font-weight="800">PATROL</text>
    <text x="402" y="286" class="t" fill="#CBD5E1" font-size="18">Cruise and scan</text>

    <rect x="650" y="210" width="250" height="90" rx="22" fill="#111827" stroke="#F59E0B" stroke-width="2"/>
    <text x="680" y="262" class="t" fill="#FEF3C7" font-size="30" font-weight="800">FIRE DETECTED</text>
    <text x="726" y="286" class="t" fill="#CBD5E1" font-size="18">Confirm target</text>

    <rect x="970" y="210" width="160" height="90" rx="22" fill="#111827" stroke="#F97316" stroke-width="2"/>
    <text x="998" y="262" class="t" fill="#FFEDD5" font-size="30" font-weight="800">AIM</text>
    <text x="994" y="286" class="t" fill="#CBD5E1" font-size="18">Orient</text>

    <rect x="890" y="470" width="240" height="90" rx="22" fill="#111827" stroke="#EF4444" stroke-width="2"/>
    <text x="928" y="522" class="t" fill="#FEE2E2" font-size="30" font-weight="800">EXTINGUISH</text>
    <text x="948" y="546" class="t" fill="#CBD5E1" font-size="18">Actuate module</text>

    <rect x="560" y="470" width="230" height="90" rx="22" fill="#111827" stroke="#A855F7" stroke-width="2"/>
    <text x="605" y="522" class="t" fill="#F3E8FF" font-size="30" font-weight="800">VERIFY</text>
    <text x="612" y="546" class="t" fill="#CBD5E1" font-size="18">Target gone?</text>

    <rect x="250" y="470" width="210" height="90" rx="22" fill="#111827" stroke="#06B6D4" stroke-width="2"/>
    <text x="290" y="522" class="t" fill="#CFFAFE" font-size="30" font-weight="800">RETURN</text>
    <text x="314" y="546" class="t" fill="#CBD5E1" font-size="18">Resume patrol</text>

    <rect x="60" y="470" width="120" height="90" rx="22" fill="#111827" stroke="#64748B" stroke-width="2"/>
    <text x="82" y="522" class="t" fill="#E2E8F0" font-size="30" font-weight="800">FAIL</text>
    <text x="74" y="546" class="t" fill="#CBD5E1" font-size="18">Fallback</text>
  </g>

  <line x1="270" y1="255" x2="350" y2="255" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="570" y1="255" x2="650" y2="255" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="900" y1="255" x2="970" y2="255" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1050" y1="300" x2="1010" y2="470" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="890" y1="515" x2="790" y2="515" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="560" y1="515" x2="460" y2="515" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="250" y1="515" x2="180" y2="515" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M675 470C675 390 675 350 776 300" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M355 470C355 360 355 330 460 300" stroke="#64748B" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <text x="294" y="240" class="t" fill="#94A3B8" font-size="18">start</text>
  <text x="595" y="240" class="t" fill="#94A3B8" font-size="18">trigger</text>
  <text x="916" y="240" class="t" fill="#94A3B8" font-size="18">align</text>
  <text x="1024" y="388" class="t" fill="#94A3B8" font-size="18">fire reached</text>
  <text x="817" y="498" class="t" fill="#94A3B8" font-size="18">done</text>
  <text x="493" y="498" class="t" fill="#94A3B8" font-size="18">clear</text>
  <text x="191" y="498" class="t" fill="#94A3B8" font-size="18">resume</text>
  <text x="689" y="378" class="t" fill="#94A3B8" font-size="18">not yet</text>
  <text x="329" y="382" class="t" fill="#94A3B8" font-size="18">abort / timeout</text>
</svg>
